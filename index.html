<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám Phá Bức Tranh Bí Ẩn - Phương Trình Mũ & Logarit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true,
        },
        options: {
          renderActions: {
            addMenu: []
          }
        },
        startup: {
            ready: () => {
                MathJax.startup.defaultReady();
            }
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --text-color: #2C3E50;
            --correct-color: #66bb6a;
            --wrong-color: #ef5350;
            --bg-color: #f5f7fa;
        }

        body {
            font-family: 'Baloo 2', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            overflow-y: auto; 
            overflow-x: hidden; 
        }

        header {
            background-color: rgba(255, 255, 255, 0.95);
            width: 95%;
            max-width: 1200px;
            margin-top: 15px;
            border-radius: 25px;
            padding: 10px 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border: 4px solid white;
            text-align: center;
            z-index: 20;
            flex-shrink: 0;
        }

        h1 {
            margin: 0 0 5px 0;
            color: var(--primary-color);
            font-size: 1.8rem;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px #fff;
        }

        .player-info-bar {
            background-color: var(--accent-color);
            color: #5d4037;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 5px;
            box-shadow: 0 3px 0 #e5c100;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background-color: white;
            color: var(--primary-color);
            border: 3px solid var(--primary-color);
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 var(--primary-color);
        }

        .action-btn:hover { transform: translateY(-2px); background-color: #fff5f5; }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }

        .container {
            display: flex;
            flex-direction: column-reverse; 
            width: 98%;
            max-width: 1400px;
            flex: 1; 
            gap: 25px;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .container { flex-direction: row; align-items: flex-start; }
            .image-section, .quiz-section { flex: 1; width: 50%; max-width: none; }
        }

        .image-section { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }

        .image-container {
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
            background-color: #fff; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 6px solid white;
        }

        .hidden-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background-color: #333; }

        .error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(255,255,255,0.95);
            color: #d32f2f; z-index: 12; text-align: center;
        }
        .error-overlay code { background: #eee; padding: 2px 5px; border-radius: 4px; font-weight: bold; color: #333; }

        .cover-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(20, 1fr); z-index: 10;
        }

        .cover-tile {
            background-color: var(--secondary-color);
            border: 1px solid rgba(255,255,255,0.2);
            transition: opacity 0.5s ease, transform 0.5s ease, border-radius 0.5s;
        }
        .cover-tile.revealed { opacity: 0; transform: scale(0.2) rotate(180deg); border-radius: 50%; pointer-events: none; }

        .status-bar {
            margin-top: 15px; background: rgba(255, 255, 255, 0.95); padding: 10px 25px;
            border-radius: 25px; font-weight: 800; color: #333; box-shadow: 0 5px 0 rgba(0,0,0,0.05);
            font-size: 1.2rem; text-align: center; display: flex; justify-content: space-between;
            gap: 20px; width: 100%; box-sizing: border-box; max-width: 500px; border: 3px solid white;
        }

        .quiz-section {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column;
            justify-content: center; min-height: 400px; box-sizing: border-box; border: 4px solid white;
        }

        .question-box {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; line-height: 1.6;
            background: #f8f9fa; 
            padding: 25px 20px 25px 60px; 
            border-radius: 15px; border: 3px dashed var(--secondary-color);
            position: relative; min-height: 60px;
        }
        .question-box::before {
            content: "❓"; position: absolute; top: -15px; left: -20px; 
            font-size: 2.8rem; background: white; border-radius: 50%; padding: 5px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); border: 2px solid var(--secondary-color);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-box { font-size: 1.2rem; padding: 20px 15px 20px 50px; }
            .question-box::before { font-size: 2rem; left: -15px; top: -10px; }
            .container { flex-direction: column-reverse; }
            .image-section { width: 100%; margin-bottom: 20px; }
            .quiz-section { width: 100%; padding: 20px; }
        }

        .option-btn {
            background-color: #fff; border: 3px solid #e0e0e0; padding: 12px 15px;
            border-radius: 15px; cursor: pointer; transition: all 0.2s ease;
            font-size: 1.1rem; font-family: 'Baloo 2', sans-serif; font-weight: 700;
            text-align: left; position: relative; color: var(--text-color);
            display: flex; align-items: center; box-shadow: 0 4px 0 #e0e0e0;
        }

        .option-btn:hover { background-color: #f0f8ff; border-color: var(--secondary-color); transform: translateY(-2px); box-shadow: 0 6px 0 var(--secondary-color); }
        .option-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--secondary-color); }

        .option-btn.correct { background-color: var(--correct-color); color: white; border-color: #43a047; box-shadow: 0 4px 0 #2e7d32; }
        .option-btn.wrong { background-color: var(--wrong-color); color: white; border-color: #e53935; box-shadow: 0 4px 0 #c62828; animation: shake 0.5s; }

        .next-btn {
            margin: 15px auto 0; background-color: var(--primary-color); color: white;
            border: none; padding: 12px 40px; border-radius: 30px; font-size: 1.2rem;
            font-family: 'Baloo 2', sans-serif; font-weight: 800; cursor: pointer;
            display: none; box-shadow: 0 5px 0 #c62828; flex-shrink: 0; transition: 0.2s;
        }
        .next-btn:active { transform: translateY(4px); box-shadow: none; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.9); display: none;
            justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 25px; text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 90%; max-width: 450px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3); border: 5px solid white;
        }
        .login-input {
            width: 100%; padding: 15px; margin: 15px 0; font-family: 'Baloo 2', sans-serif; font-size: 1.1rem;
            border: 3px solid #ddd; border-radius: 15px; box-sizing: border-box; text-align: center;
        }
        .login-btn {
            width: 100%; padding: 15px; background: var(--primary-color); font-family: 'Baloo 2', sans-serif;
            color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1.3rem;
            font-weight: 800; margin-top: 10px; box-shadow: 0 5px 0 #c62828; transition: 0.2s;
        }
        .login-btn:active { transform: translateY(4px); box-shadow: none; }

        .leaderboard-list { list-style: none; padding: 0; margin: 15px 0; max-height: 300px; overflow-y: auto; text-align: left; border: 3px solid #eee; border-radius: 15px; }
        .leaderboard-item { display: grid; grid-template-columns: 45px 1fr 70px 70px; align-items: center; padding: 12px; border-bottom: 2px solid #f0f0f0; font-size: 1rem; }
        .leaderboard-header { font-weight: 800; background: var(--accent-color); color: #555; position: sticky; top: 0; z-index: 2; border-radius: 10px 10px 0 0;}
        .leaderboard-item:last-child { border-bottom: none; }
        .lb-rank { font-weight: 800; color: #777; text-align: center; }
        .lb-name { font-weight: 700; color: var(--text-color); }
        .lb-score { font-weight: 800; color: var(--primary-color); text-align: center; }
        .lb-time { font-family: monospace; font-weight:bold; color: #555; text-align: right; }
        
        .lb-item-1 .lb-rank { color: #FFD700; font-size: 1.3rem; } 
        .lb-item-2 .lb-rank { color: #C0C0C0; font-size: 1.2rem; } 
        .lb-item-3 .lb-rank { color: #CD7F32; font-size: 1.2rem; } 

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
        .confetti { position: absolute; width: 10px; height: 10px; background: #f00; animation: fall linear forwards; border-radius: 50%; z-index: 9999; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="buctranh.mp3" type="audio/mpeg">
</audio>

<header>
    <h1>🎮 Giải Mã Bức Tranh 🎮</h1>
    <div id="playerInfoBar" class="player-info-bar" style="display:none;">
        🌟 Đội: <span id="displayPlayerName">...</span>
    </div>
    <div class="controls">
        <button id="musicToggleBtn" class="action-btn" onclick="toggleMusic()">🔇 Nhạc: Tắt</button>
        <button class="action-btn" onclick="showLeaderboard()">🏆 BXH</button>
    </div>
</header>

<div class="container">
    <div class="quiz-section" id="quiz-container-box">
        <div id="quiz-content">
            <div class="question-box" id="question-text">Đang tải...</div>
            <div class="options-grid" id="options-container"></div>
        </div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu Tiếp Theo ➜</button>
    </div>

    <div class="image-section">
        <div class="image-container" id="imgContainer">
            <img src="hinh_game.jpg" alt="Bức tranh bí ẩn" class="hidden-image" id="gameImage" onerror="handleImageError(this)">
            
            <div class="error-overlay" id="errorOverlay">
                <p style="font-size: 2rem;">🖼️❓</p>
                <p><b>Không tìm thấy ảnh!</b></p>
                <p>Cần file: <code>hinh_game.jpg</code></p>
            </div>

            <div class="cover-grid" id="coverGrid"></div>
        </div>
        <div class="status-bar">
            <span>🎯 Câu: <span id="current-q" style="color:var(--primary-color)">1</span>/<span id="total-q">10</span></span>
            <span>⏱️ <span id="timer" style="color:var(--wrong-color)">10:00</span></span>
            <span>⭐ Điểm: <span id="score" style="color:var(--primary-color)">0</span></span>
        </div>
    </div>
</div>

<div class="modal" id="loginModal" style="display: flex;">
    <div class="modal-content">
        <h2 style="color: var(--primary-color); font-size: 2rem; margin-top:0;">👋 Chào bạn!</h2>
        <p style="font-weight: 600; color: #555;">Sẵn sàng giải mã bức tranh chưa?</p>
        <p style="font-size: 0.95rem; color: #e53935; font-weight: bold;">Lưu ý: Bạn chỉ có 1 lượt chơi với thời gian 10 phút!</p>
        <input type="text" id="playerName" class="login-input" placeholder="Nhập tên Đội/Nhóm của bạn" autocomplete="off">
        <button class="login-btn" onclick="submitPlayerInfo()">VÀO GAME 🚀</button>
    </div>
</div>

<div class="modal" id="leaderboardModal">
    <div class="modal-content">
        <h2 style="color: var(--primary-color); margin-top: 0;">🏆 Bảng Xếp Hạng</h2>
        <div id="leaderboardContent"></div>
        <button class="action-btn" style="margin-top: 15px;" onclick="closeLeaderboard()">Đóng Lại ❌</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCFCslfgIwHBv8p5SSyVjIS8cNqQUD8Eao",
    authDomain: "giaimabuctranh.firebaseapp.com",
    databaseURL: "https://giaimabuctranh-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "giaimabuctranh",
    storageBucket: "giaimabuctranh.firebasestorage.app",
    messagingSenderId: "826289132746",
    appId: "1:826289132746:web:b4fd5a77f672a794e3d033",
    measurementId: "G-T75PVFMXCS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.firebaseSaveScore = async function(name, score, timeSeconds) {
      const dbRef = ref(db, 'leaderboard');
      await push(dbRef, { name, score, timeSeconds, timestamp: Date.now() });
  };

  window.firebaseGetLeaderboard = async function() {
      const dbRef = ref(db, 'leaderboard');
      const snapshot = await get(dbRef);
      if (snapshot.exists()) {
          return Object.values(snapshot.val()); 
      }
      return [];
  };
</script>

<script>
(() => {
    // CHỐNG GIAN LẬN: Khóa chuột phải và các phím tắt F12, Ctrl+U
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || 
           (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
           (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
        }
    });

    let playerName = "";
    let currentQuestionIndex = 0, score = 0, canClick = true;
    let startTime, timerInterval, finalTimeSeconds = 0;
    let isMusicPlaying = false;
    let isGameOver = false;
    const TIME_LIMIT = 600; // 10 phút = 600 giây
    
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 0.5;
    const LB_KEY = 'math_quiz_leaderboard_v2'; 

    window.onload = function() {
        if (localStorage.getItem('hasPlayed_GiaiMaBucTranh')) {
            document.getElementById('playerName').style.display = 'none';
            document.querySelector('.login-btn').style.display = 'none';
            const msg = document.createElement('p');
            msg.style.color = 'var(--wrong-color)';
            msg.style.fontWeight = 'bold';
            msg.style.fontSize = '1.2rem';
            msg.innerText = 'Bạn đã hoàn thành bài thi và không thể chơi lại!';
            document.querySelector('.modal-content').appendChild(msg);
        }
    };

    window.toggleMusic = function() {
        const btn = document.getElementById('musicToggleBtn');
        if (isMusicPlaying) {
            bgMusic.pause();
            btn.innerHTML = '🔇 Nhạc: Tắt';
            btn.style.borderColor = 'var(--primary-color)';
            btn.style.color = 'var(--primary-color)';
        } else {
            bgMusic.play().catch(e => console.log("Trình duyệt chặn autoplay"));
            btn.innerHTML = '🎵 Nhạc: Bật';
            btn.style.borderColor = 'var(--correct-color)';
            btn.style.color = 'var(--correct-color)';
        }
        isMusicPlaying = !isMusicPlaying;
    };

    window.submitPlayerInfo = function() {
        if (localStorage.getItem('hasPlayed_GiaiMaBucTranh')) {
            alert("Rất tiếc! Bạn đã hoàn thành lượt chơi của mình và không thể chơi lại.");
            return;
        }

        const n = document.getElementById('playerName').value.trim();
        if(!n) { alert("Vui lòng nhập tên Đội/Nhóm!"); return; }
        playerName = n;
        document.getElementById('displayPlayerName').innerText = playerName;
        document.getElementById('playerInfoBar').style.display = 'inline-block';
        document.getElementById('loginModal').style.display = 'none';
        
        if (!isMusicPlaying) window.toggleMusic();
        
        startTimer(); 
        playSound('correct');
    };

    function handleImageError() {
        document.getElementById('errorOverlay').style.display = 'flex';
        document.getElementById('imgContainer').classList.add('error-mode');
    }

    function startTimer() {
        startTime = Date.now();
        clearInterval(timerInterval);
        timerInterval = setInterval(updateTimerDisplay, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        return Math.floor((Date.now() - startTime) / 1000);
    }

    function updateTimerDisplay() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = TIME_LIMIT - elapsed;

        if (remaining <= 0) {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            if(!isGameOver) finishGame(true); 
            return;
        }
        document.getElementById('timer').innerText = formatTime(remaining);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    const questions = [
        { id: 1, text: "Nghiệm của phương trình $2^{\\frac{1}{x}}=3$ là:", options: ["A. $x = \\log_{2}3$", "B. $x = -\\log_{3}2$", "C. $x = -\\log_{2}3$", "D. $x = \\log_{3}2$"], ansCode: "YW5zXzM=" },
        { id: 2, text: "Tìm tổng tất cả các nghiệm của phương trình $3^{2x+8}-4.3^{x+5}+27=0$.", options: ["A. $-5$", "B. $5$", "C. $\\frac{4}{27}$", "D. $-\\frac{4}{27}$"], ansCode: "YW5zXzA=" },
        { id: 4, text: "Tìm tập nghiệm $S$ của phương trình $\\log_{6}[x(5-x)]=1$.", options: ["A. $S=\\{1; -6\\}$", "B. $S=\\{-1; 6\\}$", "C. $S=\\{2; 3\\}$", "D. $S=\\{4; 6\\}$"], ansCode: "YW5zXzI=" },
        { id: 5, text: "Gọi $T$ là tổng tất cả các nghiệm của phương trình $3^{x^{2}} \\cdot 2^{x}=1$. Mệnh đề nào sau đây là đúng?", options: ["A. $T < -\\frac{1}{2}$", "B. $-\\frac{1}{2} < T < 1$", "C. $T = 1$", "D. $T > 1$"], ansCode: "YW5zXzA=" },
        { id: 7, text: "Nghiệm của phương trình $3^{x-1} = 27$ là:", options: ["A. $x=3$", "B. $x=4$", "C. $x=2$", "D. $x=1$"], ansCode: "YW5zXzE=" },
        { id: 8, text: "Nghiệm của phương trình $\\log_2(x^2 - 1) = 3$ là:", options: ["A. $x = \\pm 3$", "B. $x = \\pm \\sqrt{7}$", "C. $x = 3$", "D. $x = \\sqrt{7}$"], ansCode: "YW5zXzA=" },
        { id: 11, text: "Nghiệm của phương trình $9^x - 4\\cdot 3^x + 3 = 0$ là:", options: ["A. $x=0, x=1$", "B. $x=1, x=3$", "C. $x=0, x=-1$", "D. $x=1, x=-3$"], ansCode: "YW5zXzA=" },
        { id: 15, text: "Nghiệm của phương trình $2^{x} \\cdot 5^{x} = 100$ là:", options: ["A. $x=1$", "B. $x=2$", "C. $x=10$", "D. $x=\\log_{10} 2$"], ansCode: "YW5zXzE=" },
        { id: 16, text: "Phương trình $\\ln x + \\ln(x+1) = 0$ có bao nhiêu nghiệm?", options: ["A. 0", "B. 1", "C. 2", "D. 3"], ansCode: "YW5zXzE=" },
        { id: 17, text: "Nghiệm của phương trình $\\log_3(x-2) = 2$ là:", options: ["A. $x=11$", "B. $x=8$", "C. $x=7$", "D. $x=5$"], ansCode: "YW5zXzA=" }
    ];

    // XÁO TRỘN CÂU HỎI TRƯỚC KHI BẮT ĐẦU GAME
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function initGame() {
        const grid = document.getElementById('coverGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 400; i++) {
            let div = document.createElement('div');
            div.className = 'cover-tile';
            div.id = `tile-${i}`;
            grid.appendChild(div);
        }
        document.getElementById('total-q').innerText = questions.length;
        loadQuestion();
    }

    function loadQuestion() {
        canClick = true;
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'none';
        
        if (currentQuestionIndex === questions.length - 1) {
            nextBtn.innerHTML = 'Kết Thúc & Xem Điểm 🏁';
            nextBtn.style.backgroundColor = '#FFB300'; 
            nextBtn.style.boxShadow = '0 5px 0 #FF8F00';
        } else {
            nextBtn.innerHTML = 'Câu Tiếp Theo ➜';
            nextBtn.style.backgroundColor = 'var(--primary-color)';
            nextBtn.style.boxShadow = '0 5px 0 #c62828';
        }

        document.getElementById('current-q').innerText = currentQuestionIndex + 1;
        const qData = questions[currentQuestionIndex];
        const qText = document.getElementById('question-text');
        const optContainer = document.getElementById('options-container');
        if(qText && optContainer) {
            qText.innerHTML = qData.text;
            optContainer.innerHTML = '';
            qData.options.forEach((opt, idx) => {
                let btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = `<span style="margin-right:8px; font-size:1.2rem;">⚫</span> ` + opt;
                btn.onclick = () => checkAnswer(idx, btn);
                optContainer.appendChild(btn);
            });
            if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') MathJax.typesetPromise([qText, optContainer]);
        }
    }

    function checkAnswer(idx, btn) {
        if (!canClick) return;
        canClick = false;
        const qData = questions[currentQuestionIndex];
        const opts = document.querySelectorAll('.option-btn');
        
        const isCorrect = btoa('ans_' + idx) === qData.ansCode;
        
        if (isCorrect) {
            btn.classList.add('correct'); playSound('correct');
            score += 10; document.getElementById('score').innerText = score;
            revealRandomPixels();
        } else {
            btn.classList.add('wrong'); playSound('wrong');
            const correctIdx = [0, 1, 2, 3].find(i => btoa('ans_' + i) === qData.ansCode);
            opts[correctIdx].classList.add('correct');
        }
        
        if (currentQuestionIndex === questions.length - 1) {
            setTimeout(() => finishGame(false), 1200);
        } else {
            document.getElementById('next-btn').style.display = 'block';
        }
    }

    function revealRandomPixels() {
        const unrevealed = Array.from(document.querySelectorAll('.cover-tile:not(.revealed)'));
        const totalTiles = 400;
        const count = Math.ceil(totalTiles / questions.length); 
        const actualCount = Math.min(count, unrevealed.length);

        if (actualCount <= 0) return;

        for (let i = unrevealed.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [unrevealed[i], unrevealed[j]] = [unrevealed[j], unrevealed[i]];
        }
        
        unrevealed.slice(0, actualCount).forEach((t, i) => setTimeout(() => t.classList.add('revealed'), i * 5));
    }

    window.nextQuestion = function() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) loadQuestion();
    };

    function getLocalLeaderboard() {
        const data = localStorage.getItem(LB_KEY);
        return data ? JSON.parse(data) : [];
    }

    function saveScore(name, score, timeSeconds) {
        let lb = getLocalLeaderboard();
        lb.push({ name, score, timeSeconds });
        localStorage.setItem(LB_KEY, JSON.stringify(lb));

        if (window.firebaseSaveScore) {
            window.firebaseSaveScore(name, score, timeSeconds).catch(e => console.error('Lỗi lưu Firebase:', e));
        }
    }

    function renderLeaderboardHTML(lb, containerId) {
        const content = document.getElementById(containerId);
        if (!lb || lb.length === 0) {
            content.innerHTML = "<p style='text-align:center; padding:20px;'>Chưa có dữ liệu. Hãy là đội đầu tiên!</p>";
            return;
        }
        lb.sort((a, b) => { if (b.score !== a.score) return b.score - a.score; return a.timeSeconds - b.timeSeconds; });
        const topLb = lb.slice(0, 50);

        let html = `
            <div class="leaderboard-list">
                <div class="leaderboard-item leaderboard-header">
                    <span class="lb-rank">#</span>
                    <span class="lb-info" style="text-align:left; margin-left:10px;">Đội</span>
                    <span class="lb-score">Điểm</span>
                    <span class="lb-time">Thời gian</span>
                </div>`;
        topLb.forEach((item, index) => {
            html += `
                <div class="leaderboard-item lb-item-${index + 1}">
                    <span class="lb-rank">${index + 1}</span>
                    <div class="lb-info"><div class="lb-name">${item.name}</div></div>
                    <span class="lb-score">${item.score}</span>
                    <span class="lb-time">${formatTime(item.timeSeconds)}</span>
                </div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    }

    window.showLeaderboard = async function() {
        document.getElementById('leaderboardModal').style.display = 'flex';
        const content = document.getElementById('leaderboardContent');
        content.innerHTML = "<p style='text-align:center; padding:20px;'>⏳ Đang tải Bảng xếp hạng...</p>";
        try {
            let firebaseData = [];
            if (window.firebaseGetLeaderboard) {
                firebaseData = await window.firebaseGetLeaderboard();
            }
            if(firebaseData.length > 0) {
                renderLeaderboardHTML(firebaseData, 'leaderboardContent');
            } else {
                renderLeaderboardHTML(getLocalLeaderboard(), 'leaderboardContent');
            }
        } catch (error) {
            console.error(error);
            renderLeaderboardHTML(getLocalLeaderboard(), 'leaderboardContent');
        }
    };

    window.closeLeaderboard = function() { 
        document.getElementById('leaderboardModal').style.display = 'none'; 
    };

    function finishGame(isTimeout = false) {
        if(isGameOver) return;
        isGameOver = true;
        
        localStorage.setItem('hasPlayed_GiaiMaBucTranh', 'true');

        finalTimeSeconds = stopTimer(); 
        const maxScore = questions.length * 10;
        const correctAnswers = score / 10;
        const perfect = score === maxScore;
        
        saveScore(playerName, score, finalTimeSeconds);
        document.getElementById('next-btn').style.display = 'none';

        if (perfect && !isTimeout) {
            document.querySelectorAll('.cover-tile').forEach(t => t.classList.add('revealed'));
            startConfetti();
        }

        let title = perfect ? "XUẤT SẮC! 🎉" : "KẾT THÚC! 🏁";
        if (isTimeout) title = "HẾT GIỜ! ⏰";
        
        let message = perfect 
            ? "Chúc mừng bạn đã mở được toàn bộ bức tranh! 🖼️✨" 
            : "Rất tiếc! Bạn chưa mở hết bức tranh. Cảm ơn bạn đã tham gia! 🧩";
        if (isTimeout) message = "Đã hết 10 phút làm bài. Bài làm của bạn đã được ghi nhận!";

        let titleColor = perfect ? "var(--correct-color)" : (isTimeout ? "var(--wrong-color)" : "var(--primary-color)");
        let mainSticker = isTimeout ? "⌛" : (perfect ? "🏆" : "🎯");

        const quizContent = document.getElementById('quiz-content');
        quizContent.innerHTML = `
            <div style="text-align: center; animation: popIn 0.5s;">
                <h2 style="font-size: 2.2rem; color: ${titleColor}; margin: 0 0 10px 0;">${title}</h2>
                <div style="font-size: 4rem; margin-bottom: 10px;">${mainSticker}</div>
                
                <div style="background: #f8f9fa; border: 3px dashed var(--secondary-color); border-radius: 15px; padding: 15px; text-align: left; display: inline-block; width: 90%; margin-bottom: 15px;">
                    <p style="font-size: 1.2rem; margin: 5px 0;">👤 Đội: <b style="color:var(--primary-color)">${playerName}</b></p>
                    <p style="font-size: 1.2rem; margin: 5px 0;">✅ Số câu đúng: <b style="color:var(--correct-color)">${correctAnswers}/${questions.length}</b></p>
                    <p style="font-size: 1.2rem; margin: 5px 0;">⭐ Điểm số: <b style="font-size:1.6rem; color:#f39c12;">${score}</b></p>
                    <p style="font-size: 1.2rem; margin: 5px 0;">⏱️ Thời gian: <b>${formatTime(finalTimeSeconds)}</b></p>
                    
                    <hr style="border: 1px dashed #ccc; margin: 15px 0;">
                    <p id="inlineRankDisplay" style="text-align: center; font-size: 1.3rem; font-weight: 800; color: #d32f2f; margin: 0;">🏅 Đang tính thứ hạng... ⏳</p>
                </div>
                
                <p style="font-size: 1.2rem; font-weight: bold; color: #555;">${message}</p>
                
                <div style="margin-top: 15px;">
                    <button class="action-btn" onclick="showLeaderboard()">🏆 Bảng Xếp Hạng</button>
                </div>
            </div>
        `;

        setTimeout(async () => {
            try {
                let sheetData = [];
                if (window.firebaseGetLeaderboard) {
                    sheetData = await window.firebaseGetLeaderboard();
                }
                
                if (!sheetData.some(item => item.name === playerName && item.score === score && item.timeSeconds === finalTimeSeconds)) {
                    sheetData.push({ name: playerName, score: score, timeSeconds: finalTimeSeconds });
                }

                sheetData.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.timeSeconds - b.timeSeconds;
                });
                
                let currentRank = sheetData.findIndex(item => item.name === playerName && item.score === score && item.timeSeconds === finalTimeSeconds) + 1;
                document.getElementById('inlineRankDisplay').innerHTML = `🏅 Thứ hạng của đội: TOP ${currentRank} 🏅`;
            } catch (e) {
                let lb = getLocalLeaderboard();
                lb.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.timeSeconds - b.timeSeconds;
                });
                let currentRank = lb.findIndex(item => item.name === playerName && item.score === score && item.timeSeconds === finalTimeSeconds) + 1;
                document.getElementById('inlineRankDisplay').innerHTML = `🏅 Thứ hạng của đội: TOP ${currentRank} 🏅 (Offline)`;
            }
        }, 800);
    }

    function startConfetti() {
        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F43'];
        for(let i=0; i<100; i++){
            let c = document.createElement('div');
            c.className='confetti';
            c.style.left = Math.random()*100+'vw';
            c.style.background = colors[Math.floor(Math.random()*colors.length)];
            c.style.animationDuration = (Math.random()*3+2)+'s';
            document.body.appendChild(c);
        }
    }

    initGame();
})();
</script>

</body>
</html>
